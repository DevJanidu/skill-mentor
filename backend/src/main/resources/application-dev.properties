# ===============================
# DATABASE CONFIGURATION
# ===============================


spring.datasource.url=${SUPERBASE_URL_DEV}
spring.datasource.username=${SUPERBASE_USERNAME_DEV}
spring.datasource.password=${SUPERBASE_PASSWORD_DEV}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=15
# Disable server-side prepared statements — required for PgBouncer transaction-mode (Supabase port 6543)
spring.datasource.hikari.data-source-properties.prepareThreshold=0


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# AUTH VALIDATOR
# ===============================
auth.validator.type=clerk


# ===============================
# CLERK CONFIGURATION
# ===============================
clerk.jwks.url=${CLERK_JWKS_URL:https://gentle-lamb-93.clerk.accounts.dev/.well-known/jwks.json}
clerk.issuer=${CLERK_ISSUER:https://gentle-lamb-93.clerk.accounts.dev}
clerk.audience=${CLERK_AUDIENCE:skill-mentor}
clerk.secret-key=${CLERK_SECRET_KEY}


# ===============================
# CORS CONFIGURATION
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}



cloudinary.cloud-name=${CLUODANARY_CLOUD_NAME}
cloudinary.api-key=${CLUODANARY_API_KEY}
cloudinary.api-secret=${CLUODANARY_SECRET_KEY}



# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.skillmentor=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n