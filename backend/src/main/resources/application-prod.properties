
# ===============================
# MULTIPART FILE UPLOADS
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${SUPERBASE_URL_DEV}
spring.datasource.username=${SUPERBASE_USERNAME_DEV}
spring.datasource.password=${SUPERBASE_PASSWORD_DEV}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# AUTH VALIDATOR
# ===============================
auth.validator.type=clerk

# ===============================
# CLERK CONFIGURATION
# ===============================
clerk.jwks.url=${CLERK_JWKS_URL}
clerk.issuer=${CLERK_ISSUER}
clerk.audience=${CLERK_AUDIENCE}
clerk.secret-key=${CLERK_SECRET_KEY}

# ===============================
# CORS CONFIGURATION
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

cloudinary.cloud-name=${CLUODANARY_CLOUD_NAME}
cloudinary.api-key=${CLUODANARY_API_KEY}
cloudinary.api-secret=${CLUODANARY_SECRET_KEY}

# ===============================
# REDIS CACHE
# ===============================
spring.cache.type=redis

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false
